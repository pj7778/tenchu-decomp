# Generated by tools/newexe.py -- run.exe is not decompiled yet.
#
# One `data` subsegment covering the whole image: splat dumps it to .word asm and
# the build reassembles it byte-identically. Carve a function out of it exactly as
# for main.exe (tools/reverse.py), and this file grows `c` subsegments the same way.
options:
  platform: psx
  basename: run.exe
  base_path: ..
  build_path: .shake/build/run.exe
  target_path: disks/tenchu/run.exe
  asm_path: .shake/gen/run.exe/asm
  asset_path: .shake/gen/run.exe/assets
  src_path: .shake/gen/run.exe/src
  compiler: GCC
  find_file_boundaries: no
  use_legacy_include_asm: no
  migrate_rodata_to_functions: no
  # include/{macro,labels,gte_macros}.inc and include_asm.h are checked-in sources
  # (config/splat.main.exe.yaml documents how to regenerate them). Six configs all
  # writing them would race; nobody writes them.
  generate_asm_macros_files: no
  gp_value: 0x8011af20
  ld_script_path: .shake/gen/run.exe/linker/run.exe.ld
  symbol_addrs_path: config/symbols.run.exe.txt
  undefined_funcs_auto_path: .shake/gen/run.exe/meta/undefined_functions_auto.run.exe.txt
  undefined_syms_auto_path: .shake/gen/run.exe/meta/undefined_symbols_auto.run.exe.txt
  generated_c_preamble: |
    #include "common.h"
  string_encoding: ASCII
  section_order:
    - .data
    - .text
    - .rodata
    - .sdata
    - .sbss
    - .bss

segments:
  - [0x800, header]
  - name: run_exe
    type: code
    align: 4
    start: 0x00000800
    vram: 0x80110000
    subalign: 4
    subsegments:
      - [0x800, data]
  - [0xb800]

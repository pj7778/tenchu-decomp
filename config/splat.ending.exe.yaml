# Generated by tools/newexe.py -- ending.exe is not decompiled yet.
#
# One `data` subsegment covering the whole image: splat dumps it to .word asm and
# the build reassembles it byte-identically. Carve a function out of it exactly as
# for main.exe (tools/reverse.py), and this file grows `c` subsegments the same way.
options:
  platform: psx
  basename: ending.exe
  base_path: ..
  build_path: .shake/build/ending.exe
  target_path: disks/tenchu/ending.exe
  asm_path: .shake/gen/ending.exe/asm
  asset_path: .shake/gen/ending.exe/assets
  src_path: .shake/gen/ending.exe/src
  compiler: GCC
  find_file_boundaries: no
  use_legacy_include_asm: no
  migrate_rodata_to_functions: no
  # include/{macro,labels,gte_macros}.inc and include_asm.h are checked-in sources
  # (config/splat.main.exe.yaml documents how to regenerate them). Six configs all
  # writing them would race; nobody writes them.
  generate_asm_macros_files: no
  gp_value: 0x800507d4
  ld_script_path: .shake/gen/ending.exe/linker/ending.exe.ld
  symbol_addrs_path: config/symbols.ending.exe.txt
  undefined_funcs_auto_path: .shake/gen/ending.exe/meta/undefined_functions_auto.ending.exe.txt
  undefined_syms_auto_path: .shake/gen/ending.exe/meta/undefined_symbols_auto.ending.exe.txt
  generated_c_preamble: |
    #include "common.h"
  string_encoding: ASCII
  section_order:
    - .text
    - .rodata
    - .data
    - .sdata
    - .sbss
    - .bss


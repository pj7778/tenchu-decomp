  # (config/splat.main.exe.yaml documents how to regenerate them). Six configs all
  # writing them would race; nobody writes them.
  generate_asm_macros_files: no
  gp_value: 0x800970b0
  ld_script_path: .shake/gen/trial.exe/linker/trial.exe.ld
  symbol_addrs_path: config/symbols.trial.exe.txt
  undefined_funcs_auto_path: .shake/gen/trial.exe/meta/undefined_functions_auto.trial.exe.txt
  undefined_syms_auto_path: .shake/gen/trial.exe/meta/undefined_symbols_auto.trial.exe.txt

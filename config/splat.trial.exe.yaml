#
# One `data` subsegment covering the whole image: splat dumps it to .word asm and
# the build reassembles it byte-identically. Carve a function out of it exactly as
# for main.exe (tools/reverse.py), and this file grows `c` subsegments the same way.
options:
  platform: psx
  basename: trial.exe
  base_path: ..
  build_path: .shake/build/trial.exe
  target_path: disks/tenchu/trial.exe
  asm_path: .shake/gen/trial.exe/asm
  asset_path: .shake/gen/trial.exe/assets
  src_path: .shake/gen/trial.exe/src
  compiler: GCC
  find_file_boundaries: no
  use_legacy_include_asm: no
  migrate_rodata_to_functions: no

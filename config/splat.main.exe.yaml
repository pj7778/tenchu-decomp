options:
  platform: psx
  basename: main.exe
  base_path: ..
  build_path: .shake/build/main.exe
  target_path: disks/tenchu/main.exe
  asm_path: .shake/gen/main.exe/asm
  asset_path: .shake/gen/main.exe/assets
  src_path: .shake/gen/main.exe/src
  compiler: GCC
  find_file_boundaries: yes
  use_legacy_include_asm: no
  migrate_rodata_to_functions: no


  # splat GENERATES include/{macro.inc,include_asm.h,labels.inc,gte_macros.inc}
  # on every run. Its macro.inc has no `li`/`move`, so re-inject ours here or the
  # build silently falls back on GNU as's builtins.
  # include/{macro,labels,gte_macros}.inc and include/include_asm.h are CHECKED-IN
  # SOURCES, not build outputs. splat rewrites them on every run of every config
  # (idempotently -- it skips the write when content matches), which means six
  # configs racing on four shared files for no benefit. Regeneration is off; if you
  # change `generated_macro_inc_content` below, flip this to `yes`, run
  # `split.py config/splat.main.exe.yaml`, commit the new include/*.inc, flip back.
  generate_asm_macros_files: no
  generated_macro_inc_content: |
    .macro .def #
    .endm

    .macro li reg, num
    .if \num < 0x8000 && \num > 0
      # ASPSX >= 2.56 (Tenchu uses 2.77) loads a signed-16-bit-positive immediate
      # with `addiu $zero`, not `ori` (see maspsx aspsx/test_expand_li.py). GNU as's
      # own `li` does the same; this override must match it or gp-less `li`s mismatch.
      addiu \reg, $0, \num
    .elseif \num > 0xFFFF
      lui \reg, %hi(\num)
    .elseif \num > 0
      ori \reg, $0, \num & 0xFFFF
    .elseif \num == -0x8000
      addiu \reg, $0, \num & 0xFFFF
    .elseif \num > -0x8000
      addiu \reg, $0, \num
    .else
      lui \reg, %hi(\num)
    .endif
    .endm

    .macro move a, b
        addu \a, \b, $zero
    .endm
  gp_value: 0x80097698
  ld_script_path: .shake/gen/main.exe/linker/main.exe.ld
  symbol_addrs_path: config/symbols.main.exe.txt
  # undefined_syms_path: meta/undefined_symbols.main.exe.txt
  undefined_funcs_auto_path: .shake/gen/main.exe/meta/undefined_functions_auto.main.exe.txt
  undefined_syms_auto_path: .shake/gen/main.exe/meta/undefined_symbols_auto.main.exe.txt
  generated_c_preamble: |
    #include "common.h"
    #include "main.exe.h"
  string_encoding: ASCII
  section_order:
    # The image interleaves two runs that splat's (non-legacy) grouped
    # linker-script generation cannot express directly:
    #   * [0x800, 0x5934)  — leading .data with six .rodata jump-table carves
    #                        cut into it;
    #   * [0x5934, 0x87800) — carved `c` files interleaved with `data` blobs
    #                        that are really UN-CARVED CODE linked as raw bytes.
    # Upstream's answer is `linker_section_order` (Segments.md): it overrides
    # which ORDER GROUP an entry joins while leaving the section it actually
    # links into alone. So the leading .rodata carves declare
    # `linker_section_order: .data` and the text-region data blobs declare
    # `linker_section_order: .text`. Each group then holds one contiguous run in
    # address order, and `ld_legacy_generation` is not needed.
    #
    # `.rodata` must still be listed: splat emits an (empty) .rodata entry per C
    # object, and a listed-but-empty group costs nothing. `align: 4` on the
    # segment matters — splat pads the END of every section group to
    # `segment.align` (default 16), and the leading run ends at 0x80016134,
    # which is 4- but not 16-aligned; padding it to 16 shifts .text by 12 bytes.
    - ".data"
    - ".text"
    - ".rodata"
    - ".sdata"
    - ".sbss"
    - ".bss"

segments:
  - [0x800, header]
  # - [0x84, bin, zeroPadding] # Zero Padding
  - name: main.exe
    type: code
    align: 4
    start: 0x00000800
    vram: 0x80011000
    # vram: 0x80016134
    subalign: 4
    subsegments:
      - [0x800, data]
      - { start: 0xA40, type: .rodata, name: FallCheck, linker_section_order: .data }

      # The first CRT/PsyQ prefix is generated as canonical assembly instead
      # of literal `.word` data.  GNU as therefore records real J/JAL and
      # HI16/LO16 relocations; `./Build check-reloc-sdk` proves the retail link
      # exact and then inserts a controlled four-byte probe before Exec.
      - [0x4F9D4, asm, LIBAPI_4F9D4]
      # PClseek is already a relocation-bearing canonical-assembly object via
      # its existing guarded source, so keep that independently classified
      # object between the two generated assembly carves.
      - [0x4FA24, c, PClseek]
      - [0x4FA48, asm, CRT_SDK_4FA48]
      # GsSetLsMatrix and the existing C/canonical-object islands stay separate.
      # Every remaining raw input in the SDK text stream is emitted as
      # canonical assembly so GNU as can retain symbolic code relocations.

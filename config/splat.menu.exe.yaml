# Generated by tools/newexe.py -- menu.exe is not decompiled yet.
#
# One `data` subsegment covering the whole image: splat dumps it to .word asm and
# the build reassembles it byte-identically. Carve a function out of it exactly as
# for main.exe (tools/reverse.py), and this file grows `c` subsegments the same way.
options:
  platform: psx
  basename: menu.exe
  base_path: ..
  build_path: .shake/build/menu.exe
  target_path: disks/tenchu/menu.exe
  asm_path: .shake/gen/menu.exe/asm
  asset_path: .shake/gen/menu.exe/assets
  src_path: .shake/gen/menu.exe/src
  compiler: GCC
  find_file_boundaries: no
  use_legacy_include_asm: no
  migrate_rodata_to_functions: no
  # include/{macro,labels,gte_macros}.inc and include_asm.h are checked-in sources
  # (config/splat.main.exe.yaml documents how to regenerate them). Six configs all
  # writing them would race; nobody writes them.
  generate_asm_macros_files: no
  gp_value: 0x8005b48c
  ld_script_path: .shake/gen/menu.exe/linker/menu.exe.ld
  symbol_addrs_path: config/symbols.menu.exe.txt
  undefined_funcs_auto_path: .shake/gen/menu.exe/meta/undefined_functions_auto.menu.exe.txt
  undefined_syms_auto_path: .shake/gen/menu.exe/meta/undefined_symbols_auto.menu.exe.txt
  generated_c_preamble: |
    #include "common.h"
  string_encoding: ASCII
  section_order:
    - .data
    - .text
    - .rodata
    - .sdata
    - .sbss
    - .bss

segments:
  - [0x800, header]
  - name: menu_exe
    type: code
    align: 4
    start: 0x00000800
    vram: 0x80011000
    subalign: 4
    subsegments:
      - [0x800, textbin]
      - [0x6ec4, c, FUN_8004f770]
      - [0x6f08, textbin]
      - [0x10d4c, c, GetMotionID]
      - [0x10dc0, textbin]
  - [0x4b000]
